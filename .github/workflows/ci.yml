name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet ./...

      - name: Staticcheck
        uses: dominikh/staticcheck-action@v1.4.1
        with:
          version: "2026.1"
          install-go: false

      - name: Test
        run: go test ./...

      - name: Race
        run: go test -race ./...

      - name: Govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-package: ./...
