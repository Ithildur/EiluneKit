name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet ./...

      - name: Staticcheck
        run: go run honnef.co/go/tools/cmd/staticcheck@2026.1 ./...

      - name: Test
        run: go test ./...

      - name: Race
        run: go test -race ./...

      - name: Setup Go for Govulncheck
        uses: actions/setup-go@v6
        with:
          go-version: stable
          check-latest: true
          cache: false

      - name: Govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.3.0 ./...
