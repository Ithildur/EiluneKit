name: dependabot-automerge

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  workflow_run:
    workflows:
      - ci
    types:
      - completed

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  label:
    if: github.event_name == 'pull_request' && github.event.pull_request.user.login == 'dependabot[bot]' && github.repository == 'Ithildur/EiluneKit'
    runs-on: ubuntu-latest
    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@d7267f607e9d3fb96fc2fbe83e0af444713e90b7
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Label update type
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          REPO: ${{ github.repository }}
          UPDATE_TYPE: ${{ steps.metadata.outputs.update-type }}
        run: |
          gh label create "dependencies:patch" --repo "$REPO" --color "2da44e" --description "Dependabot patch update" --force
          gh label create "dependencies:minor" --repo "$REPO" --color "0969da" --description "Dependabot minor update" --force
          gh label create "dependencies:major" --repo "$REPO" --color "cf222e" --description "Dependabot major update" --force

          gh pr edit "$PR_URL" --remove-label "dependencies:patch" || true
          gh pr edit "$PR_URL" --remove-label "dependencies:minor" || true
          gh pr edit "$PR_URL" --remove-label "dependencies:major" || true

          case "$UPDATE_TYPE" in
            version-update:semver-patch)
              gh pr edit "$PR_URL" --add-label "dependencies:patch"
              ;;
            version-update:semver-minor)
              gh pr edit "$PR_URL" --add-label "dependencies:minor"
              ;;
            version-update:semver-major)
              gh pr edit "$PR_URL" --add-label "dependencies:major"
              ;;
          esac

  merge:
    if: github.event_name == 'workflow_run' && github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.conclusion == 'success' && github.repository == 'Ithildur/EiluneKit'
    runs-on: ubuntu-latest
    steps:
      - name: Merge safe Dependabot PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          REPO: ${{ github.repository }}
        run: |
          prs="$(gh api -H "Accept: application/vnd.github+json" "/repos/$REPO/commits/$HEAD_SHA/pulls")"
          pr_number="$(jq -r '.[] | select(.state == "open" and .user.login == "dependabot[bot]" and .head.sha == env.HEAD_SHA) | select([.labels[].name] | any(. == "dependencies:patch" or . == "dependencies:minor")) | .number' <<<"$prs" | head -n 1)"

          if [ -z "$pr_number" ]; then
            echo "No patch/minor Dependabot PR to merge for $HEAD_SHA."
            exit 0
          fi

          gh pr merge "$pr_number" --repo "$REPO" --squash --delete-branch
